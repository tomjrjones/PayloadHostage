<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Payload Hostage</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div>
        <div class="title">
          <img src="./logo.png" alt="Payload Hostage" width="100%" height="auto">
        </div>
        <!-- <div class="subtitle">Intercept, inspect, modify, confirm.</div> -->
      </div>
    </div>

    <div class="card">
      <div class="row">
        <span class="badge" id="method">POST</span>
        <span class="badge" id="bodyType">No payload</span>
        <span class="badge" id="responseType">No response</span>
        <button
          id="toggleActive"
          class="badge badge-toggle"
        >
          INTERCEPTOR: OFF – CLICK TO ENABLE
        </button>
      </div>

      <div class="row">
        <div class="label">URL</div>
        <div class="url" id="meta">Waiting for intercepted request…</div>
      </div>
    </div>
  </div>

  <div class="card full">
    <div class="editor-grid">
      <div class="editor-pane">
        <div class="editor-header">
          <div class="editor-title">Payload 🔫</div>
          <div class="editor-meta" id="requestMeta">Editable</div>
        </div>

        <textarea
          id="payload"
          spellcheck="false"
          placeholder="Intercepted payload will appear here"
        ></textarea>
      </div>

      <div class="editor-pane">
        <div class="editor-header">
          <div class="editor-title">Response</div>
          <div class="editor-meta" id="responseMeta">Available after confirm</div>
        </div>

        <textarea
          id="response"
          spellcheck="false"
          readonly
          placeholder="Response will appear here after the request completes"
        ></textarea>
      </div>
    </div>

    <div class="footer">
      <div id="status" class="status">Idle</div>
      <div class="actions">
        <button id="format">Format</button>
        <button id="cancel">Cancel</button>
        <button id="send" class="primary">Confirm &amp; Send</button>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
